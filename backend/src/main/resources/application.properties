# Base de datos — usa variables de Railway si existen, si no usa valores locales
spring.datasource.url=jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:pezcasesor}
spring.datasource.username=${PGUSER:postgres}
spring.datasource.password=${PGPASSWORD:1234}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate no crea tablas (las crea el schema.sql)
spring.jpa.hibernate.ddl-auto=none

# Ejecuta schema.sql automaticamente al iniciar
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:database/schema.sql

spring.jpa.show-sql=false
spring.jackson.serialization.write-dates-as-timestamps=false
server.port=${PORT:8080}
